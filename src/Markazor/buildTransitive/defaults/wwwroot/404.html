<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found | Markazor</title>
  <link rel="icon" type="image/png" href="/assets/site-icon.png">
  <style>
    :root { --page: #f7f8f4; --surface: #fffdf8; --ink: #151719; --muted: #6d777a; --line: rgba(21, 23, 25, .13); --cyan: #0aa882; }
    * { box-sizing: border-box; }
    body { background: linear-gradient(180deg, #fbfbf8 0%, #edf4ef 100%); color: var(--ink); font: 1rem/1.65 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; min-height: 100vh; }
    body::before { background: linear-gradient(90deg, var(--cyan), #e35267, #3867d6); content: ""; height: .26rem; inset: 0 0 auto; position: fixed; }
    main { border-top: 1px solid var(--line); margin: 7rem auto; max-width: 42rem; padding: 1.5rem 1.25rem; }
    p:first-child { color: var(--cyan); font-size: .8rem; font-weight: 850; text-transform: uppercase; }
    h1 { font-size: clamp(2.75rem, 10vw, 5rem); line-height: .95; margin: .5rem 0; }
    a { color: #087f65; font-weight: 750; }
    @media (max-width: 520px) { main { margin-top: 4rem; } }
  </style>
</head>
<body>
  <main>
    <p>404</p>
    <h1>Page not found</h1>
    <p>The requested file or page does not exist.</p>
    <a href="/">Return home</a>
  </main>
</body>
</html>
